name: CI Pipeline Multi-Stack

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------
  # JOB 1: FRONTEND ESTATICO
  # ---------------------------------------------------
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Validar arquivos do frontend
        run: |
          test -f ./frontend/index.html
          test -f ./frontend/pages/login.html
          test -f ./frontend/css/design-tokens.css
          test -f ./frontend/css/home.css
          test -f ./frontend/css/login.css
          test -f ./nginx/templates/default.conf.template

      - name: Validar sintaxe basica do HTML
        run: |
          grep -q "<!DOCTYPE html>" ./frontend/index.html
          grep -q "<!DOCTYPE html>" ./frontend/pages/login.html

  # ---------------------------------------------------
  # JOB 2: AUTH-SERVICE (Java)
  # ---------------------------------------------------
  auth-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: "21.0.9"
          distribution: "temurin"
          cache: "maven"

      - name: Build e testes
        run: mvn clean verify
        working-directory: ./auth-service

  # ---------------------------------------------------
  # JOB 3: AI-SERVICE (Python)
  # ---------------------------------------------------
  ai-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"
          cache: "pip"
          cache-dependency-path: ./ai-service/requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ./ai-service

      - name: Lint e testes
        run: |
          pip install flake8 pytest
          flake8 .
          pytest
        working-directory: ./ai-service

  # ---------------------------------------------------
  # JOB 4: DOCKER BUILD CHECK
  # ---------------------------------------------------
  docker-check:
    runs-on: ubuntu-latest
    needs: [frontend-ci, auth-ci, ai-ci]
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Testar build do Docker Compose
        run: docker-compose build
