<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Generation | Meus Projetos</title>
    <meta
      name="description"
      content="Visualize, filtre e gerencie todos os seus carrosséis gerados com IA. Acesse o histórico completo dos seus projetos de conteúdo."
    />
    <link rel="stylesheet" href="../css/design-tokens.css" />
    <link rel="stylesheet" href="../css/projects.css" />
    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .projects-search-bar {
        display: flex;
        align-items: center;
        gap: var(--space-100);
        padding: var(--space-150) var(--space-200);
        border: 1px solid rgba(20, 33, 61, 0.08);
        border-radius: var(--radius-md);
        background: rgba(255, 253, 248, 0.88);
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 16px rgba(20, 33, 61, 0.07);
      }

      .projects-search-icon {
        font-size: 1rem;
        color: var(--color-accent);
        opacity: 0.85;
      }

      .projects-search-input {
        flex: 1;
        min-width: 0;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--color-ink-strong);
        font: inherit;
        font-size: var(--font-size-200);
      }

      .projects-search-input::placeholder {
        color: rgba(20, 33, 61, 0.55);
      }

      .projects-search-clear {
        border: 0;
        border-radius: 999px;
        padding: 0.55rem 0.9rem;
        background: rgba(20, 33, 61, 0.08);
        color: var(--color-ink-strong);
        font: inherit;
        font-size: var(--font-size-100);
        font-weight: var(--font-weight-semibold);
        cursor: pointer;
        transition: background 0.16s, transform 0.16s;
      }

      .projects-search-clear:hover {
        background: rgba(20, 33, 61, 0.12);
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body class="projects-body">
    <div class="projects-shell">

      <!-- ── Cabeçalho ──────────────────────────────────────────── -->
      <header class="projects-header">
        <a class="projects-brand" href="/" aria-label="Content Generation home">
          <span class="projects-brand-mark">CG</span>
          <span>Content Generation</span>
        </a>

        <nav class="projects-nav" aria-label="Navegacao principal">
          <a href="/pages/dashboard.html">Dashboard</a>
          <a class="is-active" href="/pages/projects.html" aria-current="page">Projetos</a>
          <a href="/pages/editor.html">Editor</a>
          <a href="#">Contextos</a>
        </nav>

        <div class="projects-session">
          <p class="projects-session-copy">
            Sessao ativa para <strong id="projects-user-email">criador@workspace</strong>
          </p>
          <button id="projects-logout" class="projects-logout" type="button">Sair</button>
        </div>
      </header>

      <!-- ── Main ───────────────────────────────────────────────── -->
      <main class="projects-main">

        <!-- Page header -->
        <div class="projects-page-header">
          <div class="projects-page-header-copy">
            <p class="projects-eyebrow">Histórico</p>
            <h1>Meus Projetos</h1>
          </div>
          <a id="projects-new-btn" class="projects-new-btn" href="/pages/editor.html">
            ✦ Novo carrossel
          </a>
        </div>

        <!-- Search -->
        <form class="projects-search-bar" id="projects-search-form" role="search" aria-label="Buscar projetos">
          <label class="sr-only" for="projects-search-input">Buscar projetos</label>
          <span class="projects-search-icon" aria-hidden="true">⌕</span>
          <input
            id="projects-search-input"
            class="projects-search-input"
            type="search"
            name="q"
            placeholder="Buscar por título ou descrição"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="projects-search-clear" class="projects-search-clear" type="button">
            Limpar
          </button>
        </form>

        <!-- Filter bar -->
        <div class="projects-filter-bar" role="group" aria-label="Filtrar projetos por status">
          <button
            id="filter-all"
            class="projects-filter-btn is-active"
            type="button"
            data-status=""
          >Todos</button>
          <button
            id="filter-done"
            class="projects-filter-btn"
            type="button"
            data-status="done"
          >✓ Concluídos</button>
          <button
            id="filter-generating"
            class="projects-filter-btn"
            type="button"
            data-status="generating"
          >⟳ Gerando</button>
          <button
            id="filter-draft"
            class="projects-filter-btn"
            type="button"
            data-status="draft"
          >Rascunho</button>
          <button
            id="filter-failed"
            class="projects-filter-btn"
            type="button"
            data-status="failed"
          >✕ Falhou</button>
        </div>

        <!-- Grid of projects -->
        <div
          id="projects-grid"
          class="projects-grid"
          role="list"
          aria-label="Lista de projetos"
          aria-live="polite"
          aria-busy="true"
        >
          <!-- Cards rendered by JS -->
        </div>

        <!-- Pagination -->
        <nav
          id="projects-pagination"
          class="projects-pagination"
          aria-label="Paginacao de projetos"
          hidden
        >
          <button id="pagination-prev" class="pagination-btn" type="button" disabled>
            ← Anterior
          </button>
          <span id="pagination-info" class="projects-pagination-info"></span>
          <button id="pagination-next" class="pagination-btn" type="button" disabled>
            Próxima →
          </button>
        </nav>

      </main>
    </div>

    <!-- ── Delete Confirmation Modal ────────────────────────────── -->
    <div
      id="delete-modal-overlay"
      class="delete-modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="delete-modal-title"
      aria-describedby="delete-modal-desc"
    >
      <div class="delete-modal">
        <p class="delete-modal-icon" aria-hidden="true">🗑️</p>
        <h2 id="delete-modal-title">Excluir projeto?</h2>
        <p id="delete-modal-desc">
          Esta ação é irreversível. O projeto e todos os seus slides serão removidos permanentemente.
        </p>
        <div class="delete-modal-actions">
          <button id="delete-cancel-btn" class="btn-cancel-delete" type="button">
            Cancelar
          </button>
          <button id="delete-confirm-btn" class="btn-confirm-delete" type="button">
            Sim, excluir
          </button>
        </div>
      </div>
    </div>

    <!-- ── Toast ─────────────────────────────────────────────────── -->
    <div id="projects-toast" class="projects-toast" role="status" aria-live="polite"></div>

    <script type="module" src="../js/projects-page.js"></script>
  </body>
</html>
