services:
  # --- Banco de dados ------
  postgres:
    image: postgres:15-alpine
    container_name: carousel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Fila e cache ------
  redis:
    image: redis:7-alpine
    container_name: carousel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  #---- auth ---------------
  auth-service:
    build: ./auth-service
    container_name: auth-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUTH_PORT}:8080"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

  #---- ai -----------------
  ai-service:
    build: ./ai-service
    container_name: ai-service
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${AI_PORT}:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}

volumes:
  postgres_data:
    name: content_generation_postgres_data_v2
  redis_data:
